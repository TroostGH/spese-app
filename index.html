<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spese</title>
<meta name="theme-color" content="#2d5a3d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spese">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f1ec;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#1a1814;min-height:100vh;font-size:15px;padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:820px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
h1{font-size:1.9rem;font-weight:300;letter-spacing:-0.5px;margin-bottom:4px}
.sub{color:#888;font-size:13px;margin-bottom:1.75rem}

.tabs{display:flex;gap:2px;background:#e8e3db;padding:3px;border-radius:10px;width:100%;margin-bottom:1.75rem}
.tab{flex:1;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888;transition:all .15s;text-align:center}
.tab.active{background:#fff;color:#1a1814;box-shadow:0 1px 4px rgba(0,0,0,.1)}

.card{background:#fff;border:1px solid #ddd8d0;border-radius:14px;padding:1.25rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.full{grid-column:1/-1}
.lbl{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
input[type=text],input[type=number],input[type=date],select{
  width:100%;padding:11px 12px;border:1.5px solid #ddd8d0;border-radius:8px;
  font-family:inherit;font-size:16px;color:#1a1814;background:#f9f7f4;
  outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none
}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select:focus{border-color:#2d5a3d;background:#fff}
.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.btn{padding:11px 22px;border-radius:8px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;border:1.5px solid #ddd8d0;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn-primary{background:#2d5a3d;color:#fff;border-color:#2d5a3d}
.btn-primary:active{background:#1e4a2e}
.btn-ghost{background:#fff;color:#888}
.btn-ghost:active{background:#f0ede8}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:7px}

.sync-bar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
.sync-lbl{font-size:12px;color:#aaa}
.month-block{margin-bottom:1.5rem}
.month-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:.6rem}
.month-hdr h3{font-size:1.05rem;font-weight:400}
.month-tot{font-size:13px;color:#888;font-variant-numeric:tabular-nums}
.exp-list{background:#fff;border:1px solid #ddd8d0;border-radius:14px;overflow:hidden}
.exp-row{display:flex;align-items:center;gap:10px;padding:12px 14px;transition:background .1s;-webkit-tap-highlight-color:transparent}
.exp-row:active{background:#f9f7f4}
.exp-row+.exp-row{border-top:1px solid #f0ede8}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-meta{font-size:12px;color:#aaa;margin-top:2px}
.exp-amt{font-size:14px;font-weight:500;white-space:nowrap;font-variant-numeric:tabular-nums}
.del-btn{width:32px;height:32px;border:none;background:transparent;color:#ccc;cursor:pointer;border-radius:8px;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.del-btn:active{background:#fdeaea;color:#a02020}

.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.stat{background:#f0ede8;border-radius:10px;padding:1rem 1.1rem}
.stat-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:4px}
.stat-val{font-size:1.3rem;font-weight:500;font-variant-numeric:tabular-nums}
.sec-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:12px}
.cat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid #f0ede8}
.cat-name{flex:1;font-size:14px}
.bar-wrap{width:70px;height:4px;background:#f0ede8;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:#2d5a3d}
.cat-amt{font-size:13px;color:#888;min-width:80px;text-align:right;font-variant-numeric:tabular-nums}
.pct-lbl{font-size:11px;color:#bbb;min-width:34px;text-align:right}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-fineco{background:#e8f0fc;color:#1a50a0}
.b-amex{background:#faf3e0;color:#806010}
.b-revolut{background:#f0e8fc;color:#5010a0}
.b-n26{background:#e8f8ec;color:#106030}
.b-contanti{background:#f0ede8;color:#605040}

.d-tasse{background:#c47a3a}.d-viaggi{background:#4a7fb5}.d-casa{background:#7a9e5a}
.d-sport{background:#d45e3a}.d-regali{background:#b05090}.d-spesa{background:#5aa08a}
.d-sfizi{background:#8060b0}.d-auto{background:#607080}.d-shopping{background:#d08040}
.d-formazione{background:#3090a0}.d-bar{background:#c05050}.d-lavoro{background:#4060a0}
.d-trasporti{background:#507050}.d-intrattenimento{background:#a050a0}
.d-medico{background:#5080c0}.d-altro{background:#909090}

.empty{text-align:center;padding:3rem 1rem;color:#bbb;font-size:14px}
.search-bar{position:relative;margin-bottom:1rem}
.search-bar input{width:100%;padding:11px 12px 11px 38px;border:1.5px solid #ddd8d0;border-radius:10px;font-family:inherit;font-size:15px;color:#1a1814;background:#fff;outline:none;transition:border-color .15s}
.search-bar input:focus{border-color:#2d5a3d}
.search-bar input::placeholder{color:#bbb}
.search-bar .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb;font-size:16px;pointer-events:none}
.hidden{display:none!important}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.month-nav select{max-width:240px;font-size:15px}
.month-nav .lbl{white-space:nowrap;margin-bottom:0}

/* Export modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:1.5rem;max-width:380px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal h3{font-size:1.1rem;font-weight:500;margin-bottom:1rem}
.modal-options{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.modal-opt{padding:12px 14px;border:1.5px solid #ddd8d0;border-radius:10px;background:#f9f7f4;font-family:inherit;font-size:14px;cursor:pointer;text-align:left;transition:all .15s;color:#1a1814}
.modal-opt:active,.modal-opt.selected{border-color:#2d5a3d;background:#eef5f0}
.modal-date-range{display:none;gap:10px;margin-bottom:1rem}
.modal-date-range.visible{display:flex}
.modal-date-range label{flex:1}
.modal-date-range .lbl{font-size:11px;font-weight:600;color:#888;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;display:block}
.modal-date-range input{width:100%;padding:10px 12px;border:1.5px solid #ddd8d0;border-radius:8px;font-family:inherit;font-size:15px;color:#1a1814;background:#f9f7f4;outline:none;-webkit-appearance:none;appearance:none}
.modal-date-range input:focus{border-color:#2d5a3d;background:#fff}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}

/* Install banner */
#install-bar{background:#2d5a3d;color:#fff;padding:12px 16px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1.25rem;font-size:14px}
#install-bar button{background:rgba(255,255,255,.2);color:#fff;border:none;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="app">

  <div id="install-bar" class="hidden">
    <span>📲 Aggiungi alla home screen per usarla come app</span>
    <button onclick="installApp()">Installa</button>
  </div>

  <h1>Le mie spese</h1>
  <div class="sub" id="hdate"></div>

  <div class="tabs">
    <button class="tab active" id="tab-btn-add" onclick="showTab('add')">+ Aggiungi</button>
    <button class="tab" id="tab-btn-list" onclick="showTab('list')">Elenco</button>
    <button class="tab" id="tab-btn-summary" onclick="showTab('summary')">Riepilogo</button>
  </div>

  <!-- ADD -->
  <div id="pane-add">
    <div class="card">
      <div class="grid2">
        <div class="full">
          <label class="lbl" for="f-name">Descrizione</label>
          <input type="text" id="f-name" placeholder="Es. Supermercato, palestra…" autocomplete="off" autocorrect="off">
        </div>
        <div>
          <label class="lbl" for="f-amount">Importo (€)</label>
          <input type="number" id="f-amount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal">
        </div>
        <div>
          <label class="lbl" for="f-date">Data</label>
          <input type="date" id="f-date">
        </div>
        <div>
          <label class="lbl" for="f-cat">Categoria</label>
          <select id="f-cat">
            <option value="Tasse">Tasse</option>
            <option value="Viaggi">Viaggi</option>
            <option value="Casa">Casa</option>
            <option value="Sport">Sport</option>
            <option value="Regali">Regali</option>
            <option value="Spesa" selected>Spesa</option>
            <option value="Sfizi e Tecnologia">Sfizi e Tecnologia</option>
            <option value="Auto">Auto</option>
            <option value="Shopping">Shopping</option>
            <option value="Formazione">Formazione</option>
            <option value="Bar e Ristoranti">Bar e Ristoranti</option>
            <option value="Lavoro">Lavoro</option>
            <option value="Trasporti">Trasporti</option>
            <option value="Intrattenimento">Intrattenimento</option>
            <option value="Medico">Medico</option>
            <option value="Altro">Altro</option>
          </select>
        </div>
        <div>
          <label class="lbl" for="f-pay">Pagamento</label>
          <select id="f-pay">
            <option value="Fineco">Fineco</option>
            <option value="Amex">Amex</option>
            <option value="Revolut">Revolut</option>
            <option value="N26">N26</option>
            <option value="Contanti">Contanti</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" id="cancel-edit-btn" onclick="cancelEdit()" class="hidden" style="display:none">Annulla modifica</button>
        <button class="btn btn-ghost" onclick="resetForm()">Pulisci</button>
        <button class="btn btn-primary" id="save-btn" onclick="addExpense()">Salva spesa</button>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div id="pane-list" class="hidden">
    <div class="sync-bar">
      <span class="sync-lbl" id="sync-status">☁️ Connessione…</span>
      <button class="btn btn-ghost btn-sm" onclick="doExport()">↓ Esporta JSON</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('file-in').click()">↑ Importa JSON</button>
      <input type="file" id="file-in" accept=".json" class="hidden" onchange="doImport(event)">
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Cerca spesa…" autocomplete="off" oninput="renderList()">
    </div>
    <div id="list-body"></div>
  </div>

  <!-- EXPORT MODAL -->
  <div id="export-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeExportModal()">
    <div class="modal">
      <h3>Esporta spese</h3>
      <div class="modal-options" id="export-month-list"></div>
      <div class="modal-date-range" id="export-date-range">
        <label>
          <span class="lbl">Da</span>
          <input type="date" id="export-from">
        </label>
        <label>
          <span class="lbl">A</span>
          <input type="date" id="export-to">
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeExportModal()">Annulla</button>
        <button class="btn btn-primary" id="export-confirm-btn" onclick="confirmExport()">Esporta</button>
      </div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="pane-summary" class="hidden">
    <!-- Toggle mese / anno -->
    <div class="tabs" style="margin-bottom:1rem">
      <button class="tab active" id="sum-tab-month" onclick="setSumView('month')">Mese</button>
      <button class="tab" id="sum-tab-year" onclick="setSumView('year')">Anno</button>
    </div>
    <!-- Navigazione mese -->
    <div id="sum-month-nav" class="month-nav">
      <label class="lbl" for="sel-month">Mese</label>
      <select id="sel-month" onchange="renderSummary()"></select>
    </div>
    <!-- Navigazione anno -->
    <div id="sum-year-nav" class="month-nav hidden">
      <label class="lbl" for="sel-year">Anno</label>
      <select id="sel-year" onchange="renderYearSummary()"></select>
    </div>
    <div id="sum-body"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
var STORAGE_KEY = 'spese_v1';
var expenses = [];
var deferredPrompt = null;
var currentTab = 'add';
var sumView = 'month';
var db = null;
var editingId = null;

var firebaseConfig = {
  apiKey: "AIzaSyBtuJg2AhxUJDrkkMY693Sg5MKcCZYr3bY",
  authDomain: "spese-app-189b1.firebaseapp.com",
  projectId: "spese-app-189b1",
  storageBucket: "spese-app-189b1.firebasestorage.app",
  messagingSenderId: "399300562167",
  appId: "1:399300562167:web:95fb3dc605dcb3b766d7f2"
};

var CAT_DOT = {
  'Tasse':'d-tasse','Viaggi':'d-viaggi','Casa':'d-casa','Sport':'d-sport',
  'Regali':'d-regali','Spesa':'d-spesa','Sfizi e Tecnologia':'d-sfizi',
  'Auto':'d-auto','Shopping':'d-shopping','Formazione':'d-formazione',
  'Bar e Ristoranti':'d-bar','Lavoro':'d-lavoro','Trasporti':'d-trasporti',
  'Intrattenimento':'d-intrattenimento','Medico':'d-medico','Altro':'d-altro'
};
var PAY_BADGE = {
  'Fineco':'b-fineco','Amex':'b-amex','Revolut':'b-revolut','N26':'b-n26','Contanti':'b-contanti'
};
var MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-bar').classList.remove('hidden');
});

window.addEventListener('appinstalled', function() {
  document.getElementById('install-bar').classList.add('hidden');
  deferredPrompt = null;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
  }
}

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    expenses = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(expenses)) expenses = [];
  } catch(e) { expenses = []; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
}

function setSyncStatus(msg) {
  var el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    // Abilita persistenza offline
    db.enablePersistence({synchronizeTabs: true}).catch(function(err) {
      console.log('Persistenza non disponibile:', err.code);
    });
    setSyncStatus('☁️ Connessione…');
    db.collection('expenses').onSnapshot(function(snapshot) {
      expenses = [];
      snapshot.forEach(function(doc) {
        expenses.push(doc.data());
      });
      expenses.sort(function(a,b){ return a.date<b.date?1:a.date>b.date?-1:(b.id-a.id); });
      saveData(); // cache locale
      setSyncStatus('☁️ Sincronizzato');
      // Aggiorna la vista corrente
      if (currentTab==='list') renderList();
      if (currentTab==='summary') {
        if (sumView==='month') { fillMonthSelect(); renderSummary(); }
        else { fillYearSelect(); renderYearSummary(); }
      }
    }, function(error) {
      console.error('Firebase error:', error);
      setSyncStatus('⚠️ Modalità offline');
    });
  } catch(e) {
    console.error('Firebase init error:', e);
    setSyncStatus('⚠️ Errore connessione');
  }
}

function todayISO() {
  var d = new Date();
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var dd = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + mm + '-' + dd;
}

function fmtMoney(n) {
  return '€ ' + Number(n).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}

function fmtDateIT(iso) {
  var p = iso.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

function monthKey(iso) { return iso.slice(0,7); }
function monthLabel(k) {
  var p = k.split('-');
  return MONTHS[parseInt(p[1],10)-1]+' '+p[0];
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function init() {
  loadData(); // caricamento rapido da localStorage
  document.getElementById('f-date').value = todayISO();
  var now = new Date();
  document.getElementById('hdate').textContent = now.toLocaleDateString('it-IT',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function(e){ console.log('SW error',e); });
  }
  initFirebase();
}

function showTab(name) {
  currentTab = name;
  var panes = ['add','list','summary'];
  for (var i = 0; i < panes.length; i++) {
    document.getElementById('pane-'+panes[i]).classList.toggle('hidden', panes[i]!==name);
    document.getElementById('tab-btn-'+panes[i]).classList.toggle('active', panes[i]===name);
  }
  if (name==='list') renderList();
  if (name==='summary') {
    if (sumView==='month') { fillMonthSelect(); renderSummary(); }
    else { fillYearSelect(); renderYearSummary(); }
  }
}

function setSumView(v) {
  sumView = v;
  document.getElementById('sum-tab-month').classList.toggle('active', v==='month');
  document.getElementById('sum-tab-year').classList.toggle('active', v==='year');
  document.getElementById('sum-month-nav').classList.toggle('hidden', v!=='month');
  document.getElementById('sum-year-nav').classList.toggle('hidden', v!=='year');
  if (v==='month') { fillMonthSelect(); renderSummary(); }
  else { fillYearSelect(); renderYearSummary(); }
}

function editExpense(id) {
  var exp = null;
  for (var i = 0; i < expenses.length; i++) {
    if (expenses[i].id === id) { exp = expenses[i]; break; }
  }
  if (!exp) return;
  editingId = id;
  document.getElementById('f-name').value = exp.name;
  document.getElementById('f-amount').value = exp.amount;
  document.getElementById('f-date').value = exp.date;
  document.getElementById('f-cat').value = exp.cat;
  document.getElementById('f-pay').value = exp.pay;
  document.getElementById('save-btn').textContent = 'Aggiorna spesa';
  document.getElementById('cancel-edit-btn').style.display = '';
  showTab('add');
  document.getElementById('f-name').focus();
}

function cancelEdit() {
  editingId = null;
  document.getElementById('save-btn').textContent = 'Salva spesa';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  resetForm();
}

function addExpense() {
  var name = document.getElementById('f-name').value.trim();
  var amountRaw = document.getElementById('f-amount').value;
  var amount = parseFloat(amountRaw);
  var date = document.getElementById('f-date').value;
  var cat = document.getElementById('f-cat').value;
  var pay = document.getElementById('f-pay').value;

  if (!name) { alert('Inserisci una descrizione.'); return; }
  if (!amountRaw || isNaN(amount) || amount<=0) { alert('Inserisci un importo valido.'); return; }
  if (!date) { alert('Inserisci una data.'); return; }

  var btn = document.getElementById('save-btn');
  btn.disabled = true;

  if (editingId) {
    // Modalità modifica
    var updated = {id:editingId, name:name, amount:amount, date:date, cat:cat, pay:pay};
    if (db) {
      db.collection('expenses').doc(String(editingId)).set(updated)
        .then(function() {
          editingId = null;
          resetForm();
          btn.disabled = false;
          btn.textContent = '✓ Aggiornata!';
          btn.style.background = '#1e7040';
          document.getElementById('cancel-edit-btn').style.display = 'none';
          setTimeout(function(){ btn.textContent='Salva spesa'; btn.style.background=''; }, 1800);
        })
        .catch(function(e) {
          console.error('Update error:', e);
          alert('Errore nell\'aggiornamento. Riprova.');
          btn.disabled = false;
        });
    } else {
      for (var i = 0; i < expenses.length; i++) {
        if (expenses[i].id === editingId) { expenses[i] = updated; break; }
      }
      expenses.sort(function(a,b){ return a.date<b.date?1:a.date>b.date?-1:(b.id-a.id); });
      saveData();
      editingId = null;
      resetForm();
      btn.disabled = false;
      btn.textContent = '✓ Aggiornata!';
      btn.style.background = '#1e7040';
      document.getElementById('cancel-edit-btn').style.display = 'none';
      setTimeout(function(){ btn.textContent='Salva spesa'; btn.style.background=''; }, 1800);
    }
    return;
  }

  var id = Date.now();
  var expense = {id:id, name:name, amount:amount, date:date, cat:cat, pay:pay};

  if (db) {
    db.collection('expenses').doc(String(id)).set(expense)
      .then(function() {
        resetForm();
        btn.disabled = false;
        btn.textContent = '✓ Salvata!';
        btn.style.background = '#1e7040';
        setTimeout(function(){ btn.textContent='Salva spesa'; btn.style.background=''; }, 1800);
      })
      .catch(function(e) {
        console.error('Save error:', e);
        alert('Errore nel salvataggio. Riprova.');
        btn.disabled = false;
      });
  } else {
    // Fallback localStorage
    expenses.push(expense);
    expenses.sort(function(a,b){ return a.date<b.date?1:a.date>b.date?-1:(b.id-a.id); });
    saveData();
    resetForm();
    btn.disabled = false;
    btn.textContent = '✓ Salvata!';
    btn.style.background = '#1e7040';
    setTimeout(function(){ btn.textContent='Salva spesa'; btn.style.background=''; }, 1800);
  }
}

function resetForm() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-date').value = todayISO();
  if (editingId) {
    editingId = null;
    document.getElementById('save-btn').textContent = 'Salva spesa';
    document.getElementById('cancel-edit-btn').style.display = 'none';
  }
}

function deleteExpense(id) {
  if (!confirm('Eliminare questa spesa?')) return;
  if (db) {
    db.collection('expenses').doc(String(id)).delete()
      .catch(function(e) { console.error('Delete error:', e); alert('Errore durante l\'eliminazione.'); });
    // onSnapshot aggiornerà automaticamente la lista
  } else {
    expenses = expenses.filter(function(e){ return e.id!==id; });
    saveData();
    renderList();
  }
}

function renderList() {
  var el = document.getElementById('list-body');
  if (!expenses.length) { el.innerHTML='<div class="empty">Nessuna spesa ancora registrata.</div>'; return; }
  var searchEl = document.getElementById('search-input');
  var query = searchEl ? searchEl.value.trim().toLowerCase() : '';
  var filtered = expenses;
  if (query) {
    filtered = expenses.filter(function(e) {
      return e.name.toLowerCase().indexOf(query) !== -1 ||
             e.cat.toLowerCase().indexOf(query) !== -1 ||
             e.pay.toLowerCase().indexOf(query) !== -1 ||
             fmtDateIT(e.date).indexOf(query) !== -1 ||
             String(e.amount).indexOf(query) !== -1;
    });
  }
  if (!filtered.length) { el.innerHTML='<div class="empty">'+(query?'Nessun risultato per "'+esc(query)+'".' : 'Nessuna spesa ancora registrata.')+'</div>'; return; }
  var groups = {};
  for (var i=0;i<filtered.length;i++) {
    var m = monthKey(filtered[i].date);
    if (!groups[m]) groups[m]=[];
    groups[m].push(filtered[i]);
  }
  var keys = Object.keys(groups).sort(function(a,b){ return a<b?1:-1; });
  var html = '';
  for (var k=0;k<keys.length;k++) {
    var m = keys[k], list = groups[m], tot=0;
    list.sort(function(a,b){ return a.date<b.date?1:a.date>b.date?-1:(b.id-a.id); });
    for (var j=0;j<list.length;j++) tot+=list[j].amount;
    var rows='';
    for (var j=0;j<list.length;j++) {
      var e=list[j];
      rows+='<div class="exp-row" onclick="editExpense('+e.id+')" style="cursor:pointer">'+
        '<div class="dot '+(CAT_DOT[e.cat]||'d-altro')+'"></div>'+
        '<div class="exp-info">'+
          '<div class="exp-name">'+esc(e.name)+'</div>'+
          '<div class="exp-meta">'+fmtDateIT(e.date)+' &middot; '+esc(e.cat)+' &middot; <span class="badge '+(PAY_BADGE[e.pay]||'')+'">'+esc(e.pay)+'</span></div>'+
        '</div>'+
        '<div class="exp-amt">'+fmtMoney(e.amount)+'</div>'+
        '<button class="del-btn" onclick="event.stopPropagation();deleteExpense('+e.id+')" title="Elimina">&times;</button>'+
      '</div>';
    }
    html+='<div class="month-block">'+
      '<div class="month-hdr"><h3>'+monthLabel(m)+'</h3><span class="month-tot">'+fmtMoney(tot)+'</span></div>'+
      '<div class="exp-list">'+rows+'</div></div>';
  }
  el.innerHTML=html;
}

function fillMonthSelect() {
  var sel=document.getElementById('sel-month');
  var prev=sel.value;
  var all=[];
  for (var i=0;i<expenses.length;i++) {
    var m=monthKey(expenses[i].date);
    if (all.indexOf(m)===-1) all.push(m);
  }
  all.sort(function(a,b){ return a<b?1:-1; });
  var cur=todayISO().slice(0,7);
  if (all.indexOf(cur)===-1) all.unshift(cur);
  var opts='';
  for (var i=0;i<all.length;i++) opts+='<option value="'+all[i]+'">'+monthLabel(all[i])+'</option>';
  sel.innerHTML=opts;
  if (prev&&all.indexOf(prev)!==-1) sel.value=prev;
}

function fillYearSelect() {
  var sel=document.getElementById('sel-year');
  var prev=sel.value;
  var years=[];
  for (var i=0;i<expenses.length;i++) {
    var y=expenses[i].date.slice(0,4);
    if (years.indexOf(y)===-1) years.push(y);
  }
  years.sort(function(a,b){ return a<b?1:-1; });
  var curY=String(new Date().getFullYear());
  if (years.indexOf(curY)===-1) years.unshift(curY);
  var opts='';
  for (var i=0;i<years.length;i++) opts+='<option value="'+years[i]+'">'+years[i]+'</option>';
  sel.innerHTML=opts;
  if (prev&&years.indexOf(prev)!==-1) sel.value=prev;
}

function renderSummary() {
  var m=document.getElementById('sel-month').value;
  var el=document.getElementById('sum-body');
  var data=expenses.filter(function(e){ return monthKey(e.date)===m; });
  if (!data.length) { el.innerHTML='<div class="empty">Nessuna spesa per '+monthLabel(m)+'.</div>'; return; }
  var total=0;
  for (var i=0;i<data.length;i++) total+=data[i].amount;
  var byCat={}, byPay={}, byPayCount={};
  for (var i=0;i<data.length;i++) {
    byCat[data[i].cat]=(byCat[data[i].cat]||0)+data[i].amount;
    byPay[data[i].pay]=(byPay[data[i].pay]||0)+data[i].amount;
    byPayCount[data[i].pay]=(byPayCount[data[i].pay]||0)+1;
  }
  var cats=[]; for (var c in byCat) cats.push([c,byCat[c]]);
  cats.sort(function(a,b){ return b[1]-a[1]; });
  var pays=[]; for (var p in byPay) pays.push([p,byPay[p]]);
  pays.sort(function(a,b){ return b[1]-a[1]; });
  var maxCat=cats[0][1];
  var catRows='';
  for (var i=0;i<cats.length;i++) {
    catRows+='<div class="cat-row">'+
      '<div class="dot '+(CAT_DOT[cats[i][0]]||'d-altro')+'"></div>'+
      '<div class="cat-name">'+esc(cats[i][0])+'</div>'+
      '<div class="bar-wrap"><div class="bar-fill" style="width:'+Math.round(cats[i][1]/maxCat*100)+'%"></div></div>'+
      '<div class="cat-amt">'+fmtMoney(cats[i][1])+'</div></div>';
  }
  var payRows='';
  for (var i=0;i<pays.length;i++) {
    var pct=Math.round(byPayCount[pays[i][0]]/data.length*100);
    payRows+='<div class="cat-row">'+
      '<div class="cat-name"><span class="badge '+(PAY_BADGE[pays[i][0]]||'')+'">'+esc(pays[i][0])+'</span></div>'+
      '<div class="pct-lbl">'+pct+'%</div>'+
      '<div class="cat-amt">'+fmtMoney(pays[i][1])+'</div></div>';
  }
  el.innerHTML=
    '<div class="sum-grid">'+
      '<div class="stat"><div class="stat-lbl">Totale mese</div><div class="stat-val">'+fmtMoney(total)+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">Transazioni</div><div class="stat-val">'+data.length+'</div></div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:1rem"><div class="sec-lbl">Per categoria</div>'+catRows+'</div>'+
    '<div class="card" style="margin-bottom:1rem"><div class="sec-lbl">Per metodo di pagamento</div>'+payRows+'</div>'+
    '<div style="display:flex;justify-content:flex-end">'+
      '<button class="btn btn-ghost btn-sm" onclick="exportMonth(\''+m+'\')">↓ Scarica riepilogo '+monthLabel(m)+'</button>'+
    '</div>';
}

function renderYearSummary() {
  var y=document.getElementById('sel-year').value;
  var el=document.getElementById('sum-body');
  var data=expenses.filter(function(e){ return e.date.slice(0,4)===y; });
  if (!data.length) { el.innerHTML='<div class="empty">Nessuna spesa per il '+y+'.</div>'; return; }
  var total=0;
  for (var i=0;i<data.length;i++) total+=data[i].amount;

  for (var i=0;i<data.length;i++) {
    var mk=monthKey(data[i].date);
    byMonth[mk]=(byMonth[mk]||0)+data[i].amount;
    byCat[data[i].cat]=(byCat[data[i].cat]||0)+data[i].amount;
    byPay[data[i].pay]=(byPay[data[i].pay]||0)+data[i].amount;
    byPayCount[data[i].pay]=(byPayCount[data[i].pay]||0)+1;
  }

      '<div class="cat-amt">'+fmtMoney(byMonth[months[i]])+'</div></div>';
  }
  var cats=[]; for (var c in byCat) cats.push([c,byCat[c]]);
  cats.sort(function(a,b){ return b[1]-a[1]; });
  var pays=[]; for (var p in byPay) pays.push([p,byPay[p]]);
  pays.sort(function(a,b){ return b[1]-a[1]; });
  var maxCat=cats[0][1];
  var catRows='';
  for (var i=0;i<cats.length;i++) {
    catRows+='<div class="cat-row">'+
      '<div class="dot '+(CAT_DOT[cats[i][0]]||'d-altro')+'"></div>'+
      '<div class="cat-name">'+esc(cats[i][0])+'</div>'+
      '<div class="bar-wrap"><div class="bar-fill" style="width:'+Math.round(cats[i][1]/maxCat*100)+'%"></div></div>'+
      '<div class="cat-amt">'+fmtMoney(cats[i][1])+'</div></div>';
  }
  var payRows='';
  for (var i=0;i<pays.length;i++) {
    var pct=Math.round(byPayCount[pays[i][0]]/data.length*100);
    payRows+='<div class="cat-row">'+
      '<div class="cat-name"><span class="badge '+(PAY_BADGE[pays[i][0]]||'')+'">'+esc(pays[i][0])+'</span></div>'+
      '<div class="pct-lbl">'+pct+'%</div>'+

  el.innerHTML=

      '<div class="stat"><div class="stat-lbl">Transazioni</div><div class="stat-val">'+data.length+'</div></div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:1rem"><div class="sec-lbl">Per mese</div>'+monthRows+'</div>'+
    '<div class="card" style="margin-bottom:1rem"><div class="sec-lbl">Per categoria</div>'+catRows+'</div>'+
    '<div class="card" style="margin-bottom:1rem"><div class="sec-lbl">Per metodo di pagamento</div>'+payRows+'</div>';
}

function exportMonth(m) {
  var data=expenses.filter(function(e){ return monthKey(e.date)===m; });
  var payload={
    mese: monthLabel(m),
    chiave: m,
    totale: data.reduce(function(s,e){ return s+e.amount; },0),
    spese: data
  };
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='spese_'+m+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

var exportSelection = null; // 'all', '2026-04', or 'custom'

function doExport() {
  exportSelection = null;
  // Costruisci lista mesi disponibili
  var months = [];
  for (var i = 0; i < expenses.length; i++) {
    var m = monthKey(expenses[i].date);
    if (months.indexOf(m) === -1) months.push(m);
  }
  months.sort(function(a,b){ return a < b ? 1 : -1; });
  var html = '<button class="modal-opt" onclick="selectExportOption(\'all\',this)">📋 Tutte le spese</button>';
  for (var i = 0; i < months.length; i++) {
    html += '<button class="modal-opt" onclick="selectExportOption(\'' + months[i] + '\',this)">' + monthLabel(months[i]) + '</button>';
  }
  html += '<button class="modal-opt" onclick="selectExportOption(\'custom\',this)">📅 Personalizzato…</button>';
  document.getElementById('export-month-list').innerHTML = html;
  document.getElementById('export-date-range').classList.remove('visible');
  document.getElementById('export-from').value = '';
  document.getElementById('export-to').value = '';
  document.getElementById('export-modal').classList.remove('hidden');
}

function selectExportOption(val, btn) {
  exportSelection = val;
  var opts = document.getElementById('export-month-list').querySelectorAll('.modal-opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  btn.classList.add('selected');
  if (val === 'custom') {
    document.getElementById('export-date-range').classList.add('visible');
  } else {
    document.getElementById('export-date-range').classList.remove('visible');
  }
}

function closeExportModal() {
  document.getElementById('export-modal').classList.add('hidden');
}

function confirmExport() {
  if (!exportSelection) { alert('Seleziona un periodo da esportare.'); return; }
  var data;
  var filename;
  if (exportSelection === 'all') {
    data = expenses;
    filename = 'spese_tutte_' + todayISO() + '.json';
  } else if (exportSelection === 'custom') {
    var from = document.getElementById('export-from').value;
    var to = document.getElementById('export-to').value;
    if (!from || !to) { alert('Inserisci entrambe le date.'); return; }
    if (from > to) { alert('La data iniziale deve essere prima di quella finale.'); return; }
    data = expenses.filter(function(e) { return e.date >= from && e.date <= to; });
    filename = 'spese_' + from + '_' + to + '.json';
  } else {
    data = expenses.filter(function(e) { return monthKey(e.date) === exportSelection; });
    filename = 'spese_' + exportSelection + '.json';
  }
  if (!data.length) { alert('Nessuna spesa nel periodo selezionato.'); return; }
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  closeExportModal();
}

function doImport(ev) {
  var file=ev.target.files[0]; if (!file) return;
  var r=new FileReader();
  r.onload=function(e){
    try {
      var imp=JSON.parse(e.target.result);
      if (!Array.isArray(imp)) throw new Error();
      if (!confirm('Importare '+imp.length+' spese? I '+expenses.length+' record attuali verranno sostituiti.')) return;
      if (db) {
        var delPromises=expenses.map(function(exp){
          return db.collection('expenses').doc(String(exp.id)).delete();
        });
        Promise.all(delPromises).then(function(){
          var batch=db.batch();
          imp.forEach(function(exp){
            var ref=db.collection('expenses').doc(String(exp.id));
            batch.set(ref,exp);
          });
          return batch.commit();
        }).then(function(){
          alert('Importazione completata: '+imp.length+' spese caricate.');
        }).catch(function(err){
          console.error('Import error:',err);
          alert('Errore durante l\'importazione.');
        });
      } else {
        expenses=imp; saveData();
        alert('Importazione completata: '+imp.length+' spese caricate.');
      }
    } catch(err){ alert('File JSON non valido.'); }
  };
  r.readAsText(file);
  ev.target.value='';
}

init();
